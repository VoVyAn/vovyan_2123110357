services:
  - type: web
    name: vovyan-backend
    runtime: docker
    envVars:
      - key: RENDER_DB_URL
        fromDatabase:
          name: vovyan-db
          property: connectionString

  - type: web
    name: vovyan-admin-portal
    env: static
    rootDir: frontend-admin

  - type: web
    name: vovyan-booking-portal
    env: static
    rootDir: frontend-booking

databases:
  - name: vovyan-db
