services:
  # 1. Backend API (Docker)
  - type: web
    name: vovyan-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: RENDER_DB_URL
        fromDatabase:
          name: vovyan-db
          property: connectionString
      - key: IS_RENDER
        value: "true"
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: vovyan-backend
      - key: Jwt__Audience
        value: vovyan-client

  # 2. Frontend Admin (Static Site)
  - type: static_site
    name: vovyan-admin-portal
    rootDir: frontend-admin
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: vovyan-backend
          type: web
          property: host

  # 3. Frontend Booking (Static Site)
  - type: static_site
    name: vovyan-booking-portal
    rootDir: frontend-booking
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: vovyan-backend
          type: web
          property: host

databases:
  - name: vovyan-db
    databaseName: vovyan
    plan: free
