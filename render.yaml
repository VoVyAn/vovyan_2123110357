services:
  # 1. Backend API (Docker)
  - type: web
    name: vovyan-backend
    runtime: docker
    plan: free
    envVars:
      - key: RENDER_DB_URL
        fromDatabase:
          name: vovyan-db
          property: connectionString

  # 2. Frontend Admin (Static Site)
  - type: web
    name: vovyan-admin-portal
    env: static
    rootDir: frontend-admin
    plan: free

  # 3. Frontend Booking (Static Site)
  - type: web
    name: vovyan-booking-portal
    env: static
    rootDir: frontend-booking
    plan: free

databases:
  - name: vovyan-db
    plan: free
